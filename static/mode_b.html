<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>recovery · breathe together</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="mode-b">

<!-- screen reader summary -->
<p aria-live="polite" style="position:absolute;left:-9999px;">
  Recovery breathing screen. Follow the animated circle for paced breathing at 5.5 breaths per minute.
</p>

<!-- ── header ────────────────────────────────────────────────────────────── -->
<header class="recovery-header" role="banner">
  <span class="recovery-title">recovery · breathe together</span>
  <span class="break-clock" id="break-clock" aria-label="break duration">00:00</span>
</header>

<!-- ── main body ─────────────────────────────────────────────────────────── -->
<main class="recovery-body" role="main">

  <!-- breathing pacer -->
  <div aria-label="Breathing pacer — expand and contract with the circle">
    <div class="breath-container">
      <!-- static guide ring -->
      <div class="guide-ring" aria-hidden="true"></div>

      <!-- animated filled circle -->
      <div class="breath-circle" aria-hidden="true"></div>

      <!-- cross-fading labels (CSS only, no JS) -->
      <div aria-hidden="true" style="position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);width:120px;text-align:center;height:22px;">
        <span class="label-in">breathe in</span>
        <span class="label-out">breathe out</span>
      </div>
    </div>

    <p class="breath-rate-caption" style="margin-top:72px;">5.5 breaths / min</p>
  </div>

  <!-- per-partner coherence -->
  <div class="coherence-section" aria-label="Coherence feedback">
    <div class="coherence-row">
      <span class="coherence-partner-label" id="label-a">Partner A</span>
      <div class="coherence-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Partner A coherence">
        <div class="coherence-fill" id="coh-fill-b-A"></div>
      </div>
      <span class="coherence-val" id="coh-val-b-A">—</span>
    </div>
    <div class="coherence-row">
      <span class="coherence-partner-label" id="label-b">Partner B</span>
      <div class="coherence-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Partner B coherence">
        <div class="coherence-fill" id="coh-fill-b-B"></div>
      </div>
      <span class="coherence-val" id="coh-val-b-B">—</span>
    </div>
  </div>

</main>

<!-- ── footer ─────────────────────────────────────────────────────────────── -->
<footer class="recovery-footer" role="contentinfo">
  follow the circle together · nothing to fix
  <br />
  <a href="/" class="back-link">← back to session</a>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
